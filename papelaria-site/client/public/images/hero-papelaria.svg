<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Patterns -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="#C85A3A" opacity="0.15"/>
    </pattern>
    
    <!-- Gradients -->
    <linearGradient id="woodGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B7F5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A6A52;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C2C2C;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2C2C2C;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#F5F1E8"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  
  <!-- Decorative background elements -->
  <circle cx="700" cy="80" r="100" fill="#C85A3A" opacity="0.08"/>
  <circle cx="150" cy="500" r="120" fill="#6B8E7F" opacity="0.06"/>
  <rect x="600" y="350" width="180" height="200" fill="#D4A574" opacity="0.08" transform="rotate(25 690 450)"/>
  
  <!-- Workspace base/desk -->
  <rect x="80" y="380" width="640" height="180" fill="url(#woodGradient)" rx="8"/>
  <rect x="80" y="380" width="640" height="180" fill="url(#shadowGradient)" rx="8"/>
  
  <!-- Wood texture lines -->
  <line x1="100" y1="395" x2="700" y2="395" stroke="#2C2C2C" stroke-width="0.5" opacity="0.1"/>
  <line x1="100" y1="420" x2="700" y2="420" stroke="#2C2C2C" stroke-width="0.5" opacity="0.08"/>
  <line x1="100" y1="450" x2="700" y2="450" stroke="#2C2C2C" stroke-width="0.5" opacity="0.08"/>
  <line x1="100" y1="480" x2="700" y2="480" stroke="#2C2C2C" stroke-width="0.5" opacity="0.1"/>
  <line x1="100" y1="510" x2="700" y2="510" stroke="#2C2C2C" stroke-width="0.5" opacity="0.08"/>
  
  <!-- Left side: Pen holder with pens -->
  <rect x="100" y="280" width="45" height="110" fill="#C85A3A" rx="6"/>
  <rect x="100" y="280" width="45" height="110" fill="#2C2C2C" opacity="0.15" rx="6"/>
  
  <!-- Pens in holder -->
  <line x1="112" y1="290" x2="112" y2="385" stroke="#D4A574" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="285" x2="120" y2="385" stroke="#F5E6D3" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="290" x2="128" y2="385" stroke="#6B8E7F" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Center-left: Stack of notebooks -->
  <g id="notebook-stack">
    <!-- Bottom notebook (dark) -->
    <rect x="180" y="320" width="110" height="80" fill="#6B8E7F" stroke="#2C2C2C" stroke-width="2" rx="3"/>
    <line x1="190" y1="340" x2="285" y2="340" stroke="#F5F1E8" stroke-width="1" opacity="0.4"/>
    <line x1="190" y1="360" x2="285" y2="360" stroke="#F5F1E8" stroke-width="1" opacity="0.3"/>
    
    <!-- Middle notebook (cream) -->
    <rect x="185" y="310" width="110" height="80" fill="#F5E6D3" stroke="#2C2C2C" stroke-width="2" rx="3"/>
    <line x1="195" y1="330" x2="290" y2="330" stroke="#C85A3A" stroke-width="1" opacity="0.3"/>
    <line x1="195" y1="350" x2="285" y2="350" stroke="#C85A3A" stroke-width="1" opacity="0.25"/>
    <line x1="195" y1="370" x2="285" y2="370" stroke="#C85A3A" stroke-width="1" opacity="0.2"/>
    
    <!-- Top notebook (white) -->
    <rect x="190" y="300" width="110" height="80" fill="#fff" stroke="#2C2C2C" stroke-width="2" rx="3"/>
    <line x1="200" y1="320" x2="295" y2="320" stroke="#D4A574" stroke-width="1" opacity="0.5"/>
    <line x1="200" y1="340" x2="295" y2="340" stroke="#D4A574" stroke-width="1" opacity="0.4"/>
    <line x1="200" y1="360" x2="290" y2="360" stroke="#D4A574" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Center: Open book/paper -->
  <g id="open-book">
    <path d="M 350 240 L 480 240 L 490 330 L 350 330 Z" fill="#F5F1E8" stroke="#2C2C2C" stroke-width="2"/>
    <path d="M 350 240 L 220 240 L 210 330 L 350 330 Z" fill="#fff" stroke="#2C2C2C" stroke-width="2"/>
    <line x1="350" y1="245" x2="350" y2="325" stroke="#2C2C2C" stroke-width="2"/>
    
    <!-- Lines on pages -->
    <line x1="235" y1="270" x2="330" y2="270" stroke="#D4A574" stroke-width="1" opacity="0.4"/>
    <line x1="235" y1="285" x2="330" y2="285" stroke="#D4A574" stroke-width="1" opacity="0.3"/>
    <line x1="235" y1="300" x2="330" y2="300" stroke="#D4A574" stroke-width="1" opacity="0.3"/>
    
    <line x1="360" y1="270" x2="455" y2="270" stroke="#6B8E7F" stroke-width="1" opacity="0.4"/>
    <line x1="360" y1="285" x2="455" y2="285" stroke="#6B8E7F" stroke-width="1" opacity="0.3"/>
    <line x1="360" y1="300" x2="455" y2="300" stroke="#6B8E7F" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Right side: Paper sheets stack -->
  <g id="paper-stack">
    <rect x="520" y="240" width="80" height="110" fill="#E8D4BB" stroke="#2C2C2C" stroke-width="1" opacity="0.6"/>
    <rect x="525" y="235" width="80" height="110" fill="#F5E6D3" stroke="#2C2C2C" stroke-width="1.5" opacity="0.8"/>
    <rect x="530" y="230" width="80" height="110" fill="#F5F1E8" stroke="#2C2C2C" stroke-width="2"/>
    <line x1="538" y1="245" x2="605" y2="245" stroke="#C85A3A" stroke-width="1" opacity="0.3"/>
    <line x1="538" y1="265" x2="605" y2="265" stroke="#C85A3A" stroke-width="1" opacity="0.25"/>
  </g>
  
  <!-- Far right: Pencils/markers standing -->
  <line x1="630" y1="200" x2="630" y2="370" stroke="#C85A3A" stroke-width="4" stroke-linecap="round"/>
  <line x1="650" y1="210" x2="650" y2="370" stroke="#D4A574" stroke-width="4" stroke-linecap="round"/>
  <line x1="670" y1="205" x2="670" y2="370" stroke="#6B8E7F" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Decorative elements on desk -->
  <!-- Small geometric shapes -->
  <circle cx="420" cy="420" r="12" fill="#C85A3A" opacity="0.2"/>
  <rect x="460" y="410" width="20" height="20" fill="#6B8E7F" opacity="0.15" transform="rotate(20 470 420)"/>
  
  <!-- Light accent elements -->
  <circle cx="320" cy="200" r="60" fill="#D4A574" opacity="0.05"/>
  <circle cx="550" cy="150" r="70" fill="#6B8E7F" opacity="0.04"/>
</svg>
